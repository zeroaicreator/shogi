<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>将棋</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  min-height:100vh;
  background:radial-gradient(ellipse at 30% 20%,#2d1a00,#1a0a00 60%,#0d0500);
  font-family:'Noto Serif JP',serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px;user-select:none;overflow-x:hidden;
}
button{font-family:'Noto Serif JP',serif;cursor:pointer;transition:opacity .15s;}
button:active{opacity:0.7;}
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;min-height:100vh;}
.screen.active{display:flex;}

/* ホーム */
.home-icon{font-size:60px;margin-bottom:10px;filter:drop-shadow(0 0 24px rgba(212,168,83,.6));}
.home-title{color:#d4a853;font-size:clamp(28px,8vw,48px);letter-spacing:.5em;text-shadow:0 0 30px rgba(212,168,83,.6);font-weight:700;}
.home-btns{display:flex;flex-direction:column;gap:16px;width:100%;max-width:300px;margin-top:40px;}
.btn-gold{background:linear-gradient(135deg,#d4a853,#a07820);color:#1a0a00;border:none;border-radius:10px;font-weight:700;letter-spacing:.15em;box-shadow:0 4px 20px rgba(212,168,83,.3);}
.btn-outline{background:transparent;color:#d4a853;border:1px solid rgba(212,168,83,.4);border-radius:8px;font-weight:700;letter-spacing:.15em;}
.mode-btn{padding:16px 20px;font-size:16px;display:flex;align-items:center;gap:12px;width:100%;}
.mode-btn .icon{font-size:24px;}
.mode-btn .label{font-size:15px;letter-spacing:.2em;}
.mode-btn .sub{font-size:11px;opacity:.65;font-weight:400;letter-spacing:.1em;}

/* AI設定 */
.config-wrap{background:rgba(212,168,83,.05);border:1px solid rgba(212,168,83,.2);border-radius:16px;padding:28px;width:100%;max-width:340px;}
.level-display{background:linear-gradient(135deg,#d4a853,#a07820);color:#1a0a00;font-weight:700;font-size:26px;padding:6px 20px;border-radius:10px;box-shadow:0 4px 15px rgba(212,168,83,.3);}
input[type=range]{width:100%;height:8px;appearance:none;-webkit-appearance:none;border-radius:4px;outline:none;cursor:pointer;margin-bottom:16px;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#d4a853;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.4);}

/* ゲームヘッダー */
.game-header{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:500px;margin-bottom:6px;}
.header-title{color:#d4a853;font-size:14px;letter-spacing:.2em;text-shadow:0 0 12px rgba(212,168,83,.4);}

/* 勝敗 */
.gameover-box{background:rgba(212,168,83,.12);border:2px solid #d4a853;border-radius:12px;padding:10px 20px;color:#d4a853;font-size:15px;margin-bottom:8px;text-align:center;}
.gameover-btns{display:flex;gap:8px;margin-top:8px;justify-content:center;}

/* 盤 */
.board-wrap{background:linear-gradient(145deg,#c89628,#9a7018);border-radius:6px;padding:4px;box-shadow:0 8px 40px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.1);}
.board{display:grid;grid-template-columns:repeat(9,1fr);gap:1px;background:#5a3a10;border:2px solid #5a3a10;}
.cell{display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;background:linear-gradient(135deg,#e8c870,#d4b458);}
.cell.selected{background:#f0e060;box-shadow:inset 0 0 0 2px #b09000;}
.cell.last-move{background:#e8d880;}
.cell.valid-empty{background:#c8b060;}
.cell.valid-capture::after{content:'';position:absolute;inset:0;border:3px solid rgba(50,25,0,.4);border-radius:1px;pointer-events:none;}
.dot{width:36%;height:36%;border-radius:50%;background:rgba(50,25,0,.35);}

/* 持ち駒 */
.capture-bar{display:flex;flex-wrap:wrap;gap:3px;padding:4px 8px;min-height:38px;align-items:center;justify-content:center;width:100%;max-width:500px;}
.cap-piece{background:transparent;border:2px solid transparent;border-radius:6px;padding:2px;position:relative;display:flex;align-items:center;}
.cap-piece.selected-drop{background:rgba(212,168,83,.25);border-color:#d4a853;}
.cap-count{position:absolute;bottom:0;right:-4px;font-size:9px;background:rgba(0,0,0,.7);border-radius:3px;padding:0 2px;}
.no-cap{color:#333;font-size:11px;}

/* ラベル */
.player-label{font-size:12px;letter-spacing:.1em;height:18px;}

/* ドロップヒント */
.drop-hint{color:#d4a853;font-size:12px;margin-top:6px;background:rgba(212,168,83,.1);padding:4px 12px;border-radius:6px;border:1px solid rgba(212,168,83,.3);}
.tip{color:#383838;font-size:10px;margin-top:6px;letter-spacing:.05em;}

/* 戻るボタン絶対配置 */
.back-abs{position:absolute;top:20px;left:20px;}
</style>
</head>
<body>

<!-- ホーム画面 -->
<div id="screen-home" class="screen active">
  <div class="home-icon">♟</div>
  <h1 class="home-title">将　棋</h1>
  <div class="home-btns">
    <button class="btn-gold mode-btn" onclick="startGame('local')">
      <span class="icon">🤝</span>
      <div><div class="label">ローカル対戦</div><div class="sub">2人で交互に対局</div></div>
    </button>
    <button class="btn-outline mode-btn" onclick="showScreen('ai-config')">
      <span class="icon">🤖</span>
      <div><div class="label">AI対戦</div><div class="sub">コンピューターと対局</div></div>
    </button>
  </div>
</div>

<!-- AI設定画面 -->
<div id="screen-ai-config" class="screen" style="position:relative;">
  <button class="btn-outline back-abs" style="padding:6px 14px;font-size:13px;" onclick="showScreen('home')">← 戻る</button>
  <div style="text-align:center;margin-bottom:28px;">
    <div style="font-size:40px;margin-bottom:8px;">🤖</div>
    <h2 style="color:#d4a853;font-size:20px;letter-spacing:.3em;">AI対戦</h2>
    <p style="color:#7a5a3a;font-size:13px;margin-top:6px;letter-spacing:.15em;">AIの強さを選んでください</p>
  </div>
  <div class="config-wrap">
    <input type="range" id="level-slider" min="0" max="100" value="50" oninput="updateLevel(this.value)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span style="color:#5a3a1a;font-size:11px;">Lv.0</span>
      <div class="level-display" id="level-display">Lv.50</div>
      <span style="color:#5a3a1a;font-size:11px;">Lv.100</span>
    </div>
    <div id="level-label" style="text-align:center;color:#9a7a5a;font-size:14px;margin-bottom:24px;letter-spacing:.1em;">🌳 中級</div>
    <button class="btn-gold" style="width:100%;padding:14px;font-size:16px;letter-spacing:.3em;" onclick="startGame('ai')">対　局　開　始</button>
  </div>
</div>

<!-- ゲーム画面 -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <button class="btn-outline" style="padding:4px 10px;font-size:12px;" onclick="showScreen('home')">← メニュー</button>
    <span class="header-title" id="game-title"></span>
    <button class="btn-outline" id="undo-btn" style="padding:4px 10px;font-size:12px;" onclick="undoMove()">↩ 戻る</button>
  </div>

  <div id="gameover-box" class="gameover-box" style="display:none;">
    <div id="gameover-msg"></div>
    <div class="gameover-btns">
      <button class="btn-gold" style="padding:6px 16px;font-size:13px;" onclick="restartGame()">もう一度</button>
      <button class="btn-outline" style="padding:6px 16px;font-size:13px;" onclick="showScreen('home')">メニューへ</button>
    </div>
  </div>

  <div id="p2-label" class="player-label" style="margin-bottom:3px;"></div>
  <div id="cap-bar-2" class="capture-bar"></div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>

  <div id="cap-bar-1" class="capture-bar"></div>
  <div id="p1-label" class="player-label" style="margin-top:2px;"></div>
  <div id="drop-hint" class="drop-hint" style="display:none;"></div>
  <p class="tip">タップで選択→移動 ／ 持ち駒タップで打つ</p>
</div>

<script>
// ===== 音 =====
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx) audioCtx = new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function playSound(type){
  try{
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    const sz = ctx.sampleRate * 0.07;
    const buf = ctx.createBuffer(1, sz, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<sz;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/sz,8);
    const noise = ctx.createBufferSource(); noise.buffer = buf;
    const filt = ctx.createBiquadFilter(); filt.type='bandpass';
    filt.frequency.value = type==='capture'?1400:2200; filt.Q.value=1.2;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(type==='capture'?1.6:1.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now+0.06);
    const osc = ctx.createOscillator(); osc.type='sine';
    osc.frequency.setValueAtTime(type==='capture'?520:780, now);
    osc.frequency.exponentialRampToValueAtTime(200, now+0.05);
    const og = ctx.createGain();
    og.gain.setValueAtTime(0.4, now);
    og.gain.exponentialRampToValueAtTime(0.001, now+0.05);
    noise.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
    osc.connect(og); og.connect(ctx.destination);
    noise.start(now); noise.stop(now+0.07);
    osc.start(now); osc.stop(now+0.05);
  }catch(e){}
}

// ===== 駒データ =====
const PD = {K:"玉",R:"飛",B:"角",G:"金",S:"銀",N:"桂",L:"香",P:"歩","+R":"龍","+B":"馬","+S":"全","+N":"圭","+L":"仝","+P":"と"};
const PROMOTABLE = {R:1,B:1,S:1,N:1,L:1,P:1};
const PRMAP = {R:"+R",B:"+B",S:"+S",N:"+N",L:"+L",P:"+P"};
const DEMAP = {"+R":"R","+B":"B","+S":"S","+N":"N","+L":"L","+P":"P"};

function mkBoard(){
  const b=Array(9).fill(null).map(()=>Array(9).fill(null));
  const r2=['L','N','S','G','K','G','S','N','L'];
  r2.forEach((t,c)=>b[0][c]={t,p:2});
  b[1][1]={t:'R',p:2}; b[1][7]={t:'B',p:2};
  for(let c=0;c<9;c++)b[2][c]={t:'P',p:2};
  r2.forEach((t,c)=>b[8][c]={t,p:1});
  b[7][7]={t:'R',p:1}; b[7][1]={t:'B',p:1};
  for(let c=0;c<9;c++)b[6][c]={t:'P',p:1};
  return b;
}

function getMoves(board, row, col, piece){
  const mv=[];
  const {t,p}=piece; const dir=p===1?-1:1;
  const add=(r,c)=>{
    if(r<0||r>8||c<0||c>8)return false;
    const x=board[r][c];
    if(x&&x.p===p)return false;
    mv.push([r,c]); return !x;
  };
  const slide=(dr,dc)=>{let r=row+dr,c=col+dc;while(add(r,c)){r+=dr;c+=dc;}};
  switch(t){
    case'K':for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)if(dr||dc)add(row+dr,col+dc);break;
    case'R':slide(1,0);slide(-1,0);slide(0,1);slide(0,-1);break;
    case'+R':slide(1,0);slide(-1,0);slide(0,1);slide(0,-1);add(row+1,col+1);add(row+1,col-1);add(row-1,col+1);add(row-1,col-1);break;
    case'B':slide(1,1);slide(1,-1);slide(-1,1);slide(-1,-1);break;
    case'+B':slide(1,1);slide(1,-1);slide(-1,1);slide(-1,-1);add(row+1,col);add(row-1,col);add(row,col+1);add(row,col-1);break;
    case'G':case'+S':case'+N':case'+L':case'+P':
      add(row+dir,col);add(row+dir,col+1);add(row+dir,col-1);add(row,col+1);add(row,col-1);add(row-dir,col);break;
    case'S':add(row+dir,col);add(row+dir,col+1);add(row+dir,col-1);add(row-dir,col+1);add(row-dir,col-1);break;
    case'N':add(row+dir*2,col+1);add(row+dir*2,col-1);break;
    case'L':{let r=row+dir;while(r>=0&&r<=8){if(!add(r,col))break;r+=dir;}}break;
    case'P':add(row+dir,col);break;
  }
  return mv;
}

function inZone(row,p){return p===1?row<=2:row>=6;}

// ===== AI =====
const PV={K:10000,R:1000,B:900,G:600,S:550,N:450,L:430,P:100,"+R":1300,"+B":1200,"+S":650,"+N":500,"+L":480,"+P":300};
function evalB(b,c1,c2){
  let s=0;
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){const p=b[r][c];if(p)s+=(PV[p.t]||0)*(p.p===2?1:-1);}
  c1.forEach(t=>{s-=(PV[t]||0)*.8;}); c2.forEach(t=>{s+=(PV[t]||0)*.8;});
  return s;
}
function allMoves(b,pl,caps){
  const mv=[];
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){const p=b[r][c];if(p&&p.p===pl)getMoves(b,r,c,p).forEach(([tr,tc])=>mv.push({from:[r,c],to:[tr,tc]}))}
  const mc=pl===2?caps[1]:caps[0];
  [...new Set(mc)].forEach(t=>{for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(!b[r][c])mv.push({drop:t,to:[r,c]});});
  return mv;
}
function applyMv(b,caps,mv,pl){
  const nb=b.map(r=>[...r]);
  const nc=[caps[0]?[...caps[0]]:[], caps[1]?[...caps[1]]:[]];
  const ci=pl===1?0:1;
  if(mv.drop){
    nb[mv.to[0]][mv.to[1]]={t:mv.drop,p:pl};
    const arr=nc[ci];const idx=arr.indexOf(mv.drop);if(idx!==-1)arr.splice(idx,1);
  }else{
    const [fr,fc]=mv.from;const [tr,tc]=mv.to;
    const piece=nb[fr][fc];const tgt=nb[tr][tc];
    if(tgt){nc[ci].push(DEMAP[tgt.t]||tgt.t);}
    let ft=piece.t;
    if(PROMOTABLE[piece.t]&&(inZone(fr,pl)||inZone(tr,pl)))ft=PRMAP[piece.t];
    nb[tr][tc]={t:ft,p:pl};nb[fr][fc]=null;
  }
  return{b:nb,c:nc};
}
function minimax(b,caps,depth,alpha,beta,max){
  if(depth===0)return evalB(b,caps[0],caps[1]);
  const pl=max?2:1;
  const mv=allMoves(b,pl,caps);
  if(!mv.length)return max?-99999:99999;
  if(max){
    let best=-Infinity;
    for(const m of mv){const{b:nb,c:nc}=applyMv(b,caps,m,pl);best=Math.max(best,minimax(nb,nc,depth-1,alpha,beta,false));alpha=Math.max(alpha,best);if(beta<=alpha)break;}
    return best;
  }else{
    let best=Infinity;
    for(const m of mv){const{b:nb,c:nc}=applyMv(b,caps,m,pl);best=Math.min(best,minimax(nb,nc,depth-1,alpha,beta,true));beta=Math.min(beta,best);if(beta<=alpha)break;}
    return best;
  }
}
function getAIMv(b,caps,level){
  const depth=level<20?1:level<50?2:level<80?3:4;
  const rnd=Math.max(0,(100-level)/100);
  const mv=allMoves(b,2,caps);
  if(!mv.length)return null;
  const sc=mv.map(m=>{const{b:nb,c:nc}=applyMv(b,caps,m,2);return{m,s:minimax(nb,nc,depth-1,-Infinity,Infinity,false)};});
  sc.sort((a,b)=>b.s-a.s);
  const dn=Math.floor(sc.length*rnd*.5);
  const pool=sc.slice(0,Math.max(1,sc.length-dn));
  return pool[Math.floor(Math.random()*pool.length)].m;
}

// ===== 駒SVG =====
function pieceSVG(type,player,size){
  const disp=PD[type]||type;
  const isProm=type.startsWith('+');
  const isEnemy=player===2;
  const rotate=isEnemy?'rotate(180deg)':'none';
  const g1=isEnemy?'#c8b89a':'#eedcb4', g2=isEnemy?'#b4966c':'#d4b878', g3=isEnemy?'#9a7a50':'#c0a060';
  const e1=isEnemy?'#7a5a3a':'#a07030', e2=isEnemy?'#5a3a1a':'#7a5020';
  const stroke=isEnemy?'#7a5a3a':'#9a7a4a';
  const textFill=isProm?'#c0200a':(isEnemy?'#2a1a0a':'#1a0a00');
  const fontSize=disp.length>1?11:15;
  const uid=`${type}${player}`.replace(/\+/g,'p');
  return `<svg width="${size}" height="${size}" viewBox="0 0 44 44" style="transform:${rotate};display:block;filter:drop-shadow(0 2px 3px rgba(0,0,0,.4))">
  <defs>
    <linearGradient id="wg${uid}" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="${g1}"/><stop offset="50%" stop-color="${g2}"/><stop offset="100%" stop-color="${g3}"/>
    </linearGradient>
    <linearGradient id="we${uid}" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="${e1}"/><stop offset="100%" stop-color="${e2}"/>
    </linearGradient>
  </defs>
  <polygon points="22,41 5,36 4,12 22,4 40,12 40,36" fill="rgba(0,0,0,.3)" transform="translate(1.5,1.5)"/>
  <polygon points="22,41 5,36 4,12 22,4 40,12 40,36" fill="url(#we${uid})" transform="translate(0,1.5)"/>
  <polygon points="22,40 5,35 4,11 22,3 40,11 40,35" fill="url(#wg${uid})" stroke="${stroke}" stroke-width=".7"/>
  <line x1="13" y1="9" x2="11" y2="34" stroke="rgba(255,255,255,.09)" stroke-width="1"/>
  <line x1="22" y1="5" x2="22" y2="38" stroke="rgba(255,255,255,.07)" stroke-width="1.2"/>
  <line x1="31" y1="9" x2="33" y2="34" stroke="rgba(255,255,255,.09)" stroke-width="1"/>
  <text x="22" y="27" text-anchor="middle" font-size="${fontSize}" font-family="'Noto Serif JP',serif" font-weight="bold" fill="${textFill}">${disp}</text>
</svg>`;
}

// ===== ゲーム状態 =====
let board, currentPlayer, cap1, cap2, selected, validMoves, dropPiece, gameOver, lastMove, history, mode, level, aiTimer;

function initGame(m){
  mode=m; level=parseInt(document.getElementById('level-slider').value)||50;
  board=mkBoard(); currentPlayer=1; cap1=[]; cap2=[];
  selected=null; validMoves=[]; dropPiece=null; gameOver=false; lastMove=null; history=[];
  clearTimeout(aiTimer);
}

// ===== 画面切替 =====
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

function startGame(m){
  initGame(m);
  showScreen('game');
  updateGameTitle();
  render();
}
function restartGame(){startGame(mode);}

// ===== レベル更新 =====
function updateLevel(v){
  v=parseInt(v);
  const slider=document.getElementById('level-slider');
  slider.style.background=`linear-gradient(to right,#d4a853 ${v}%,rgba(212,168,83,.15) ${v}%)`;
  document.getElementById('level-display').textContent=`Lv.${v}`;
  const lbl=v<10?"🌱 入門":v<25?"🌱 超初級":v<40?"🌿 初級":v<55?"🌳 中級":v<70?"🔥 上級":v<85?"🔥 高段":v<95?"⚡ 有段":"⚡ 最強";
  document.getElementById('level-label').textContent=lbl;
}
updateLevel(50);

function updateGameTitle(){
  const lv=level;
  const em=lv<20?"🌱":lv<40?"🌿":lv<60?"🌳":lv<80?"🔥":"⚡";
  document.getElementById('game-title').textContent=
    mode==='local'?"🤝 ローカル対戦":`🤖 AI対戦 ${em}Lv.${lv}`;
}

// ===== 描画 =====
function cellSize(){return Math.min(Math.floor((Math.min(window.innerWidth,500)-20)/9),54);}
function pieceSize(){return Math.floor(cellSize()*.84);}

function render(){
  renderBoard();
  renderCaptures();
  renderLabels();
  renderGameOver();
  renderUndoBtn();
  renderDropHint();
}

function renderBoard(){
  const cw=cellSize(), ch=Math.floor(cw*1.1), ps=pieceSize();
  const bEl=document.getElementById('board');
  bEl.style.gridTemplateColumns=`repeat(9,${cw}px)`;
  bEl.innerHTML='';
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){
    const cell=document.createElement('div');
    cell.className='cell';
    cell.style.width=cw+'px'; cell.style.height=ch+'px';
    const isSel=selected&&selected[0]===r&&selected[1]===c;
    const isValid=validMoves.some(([vr,vc])=>vr===r&&vc===c);
    const isLast=lastMove&&lastMove.r===r&&lastMove.c===c;
    const piece=board[r][c];
    if(isSel)cell.classList.add('selected');
    else if(isLast)cell.classList.add('last-move');
    else if(isValid&&!piece)cell.classList.add('valid-empty');
    if(isValid&&piece)cell.classList.add('valid-capture');
    if(isValid&&!piece){const dot=document.createElement('div');dot.className='dot';cell.appendChild(dot);}
    if(piece){cell.innerHTML+=pieceSVG(piece.t,piece.p,ps);}
    cell.addEventListener('click',()=>handleClick(r,c));
    bEl.appendChild(cell);
  }
}

function renderCaptures(){
  renderCaptureBar('cap-bar-2', cap2, 2);
  renderCaptureBar('cap-bar-1', cap1, 1);
}
function renderCaptureBar(id, caps, player){
  const bar=document.getElementById(id);
  const counts={};
  caps.forEach(t=>{counts[t]=(counts[t]||0)+1;});
  bar.innerHTML='';
  const ps=Math.min(pieceSize(),32);
  if(!Object.keys(counts).length){
    const sp=document.createElement('span');sp.className='no-cap';sp.textContent='持ち駒なし';bar.appendChild(sp);return;
  }
  Object.entries(counts).forEach(([type,cnt])=>{
    const btn=document.createElement('button');
    btn.className='cap-piece';
    const isActive=(player===currentPlayer)&&!gameOver&&!(mode==='ai'&&player===2);
    if(dropPiece===type&&player===currentPlayer)btn.classList.add('selected-drop');
    const inner=document.createElement('div');
    if(player===2)inner.style.transform='rotate(180deg)';
    inner.innerHTML=pieceSVG(type,player,ps);
    btn.appendChild(inner);
    if(cnt>1){
      const sp=document.createElement('span');
      sp.className='cap-count';
      sp.style.color=player===2?'#c88':'#d4a853';
      sp.textContent=cnt;
      btn.appendChild(sp);
    }
    if(isActive)btn.addEventListener('click',()=>handleCapClick(type,player));
    bar.appendChild(btn);
  });
}

function renderLabels(){
  const isLocal=mode==='local';
  const p2lbl=isLocal?'後手':'AI（後手）';
  const p1lbl=isLocal?'先手':'あなた（先手）';
  const aiThink=document.getElementById('p2-label').dataset.thinking==='1';

  const p2el=document.getElementById('p2-label');
  const p1el=document.getElementById('p1-label');

  if(!isLocal&&p2el.dataset.thinking==='1'){
    p2el.style.color='#e07050'; p2el.textContent='🤔 AI思考中…';
  } else if(currentPlayer===2&&!gameOver){
    p2el.style.color='#d4a853'; p2el.textContent=`▶ ${p2lbl}の番`;
  } else {
    p2el.style.color='#555'; p2el.textContent=`　${p2lbl}`;
  }

  if(currentPlayer===1&&!gameOver){
    p1el.style.color='#d4a853'; p1el.textContent=`▶ ${p1lbl}の番`;
  } else {
    p1el.style.color='#555'; p1el.textContent=`　${p1lbl}`;
  }
}

function setAIThinking(v){
  document.getElementById('p2-label').dataset.thinking=v?'1':'0';
  renderLabels();
}

function renderGameOver(){
  const box=document.getElementById('gameover-box');
  const msg=document.getElementById('gameover-msg');
  if(gameOver){
    box.style.display='block';
    const isLocal=mode==='local';
    msg.textContent=isLocal?`🏆 ${gameOver===1?'先手':'後手'}の勝ち！`:gameOver===1?'🏆 あなたの勝ち！':'💀 あなたの負け…';
  } else {
    box.style.display='none';
  }
}

function renderUndoBtn(){
  const btn=document.getElementById('undo-btn');
  const disabled=history.length===0||!!gameOver;
  btn.style.opacity=disabled?'0.3':'1';
  btn.style.cursor=disabled?'not-allowed':'pointer';
}

function renderDropHint(){
  const hint=document.getElementById('drop-hint');
  if(dropPiece){hint.style.display='block';hint.textContent=`「${PD[dropPiece]}」を打つ場所をタップ`;}
  else hint.style.display='none';
}

// ===== イベント =====
function pushHistory(){
  history.push({
    board:board.map(r=>r.map(c=>c?{...c}:null)),
    cap1:[...cap1],cap2:[...cap2],
    player:currentPlayer,lastMove:lastMove?{...lastMove}:null
  });
}

function handleCapClick(type,player){
  if(gameOver)return;
  if(mode==='ai'&&player===2)return;
  if(player!==currentPlayer)return;
  dropPiece=dropPiece===type?null:type;
  selected=null;validMoves=[];
  render();
}

function handleClick(row,col){
  if(gameOver)return;
  if(mode==='ai'&&currentPlayer!==1)return;

  const piece=board[row][col];

  if(dropPiece){
    if(piece)return;
    pushHistory();
    board[row][col]={t:dropPiece,p:currentPlayer};
    const caps=currentPlayer===1?cap1:cap2;
    const idx=caps.indexOf(dropPiece);
    if(idx!==-1)caps.splice(idx,1);
    playSound('place');
    lastMove={r:row,c:col};
    dropPiece=null;selected=null;validMoves=[];
    currentPlayer=currentPlayer===1?2:1;
    render();
    if(mode==='ai'&&currentPlayer===2)scheduleAI();
    return;
  }

  if(selected){
    const isValid=validMoves.some(([vr,vc])=>vr===row&&vc===col);
    if(isValid){
      pushHistory();
      const moving=board[selected[0]][selected[1]];
      const target=board[row][col];
      const isCapture=!!target;
      if(target){
        if(target.t==='K')gameOver=currentPlayer;
        const base=DEMAP[target.t]||target.t;
        (currentPlayer===1?cap1:cap2).push(base);
      }
      let ft=moving.t;
      if(PROMOTABLE[moving.t]&&(inZone(selected[0],currentPlayer)||inZone(row,currentPlayer)))ft=PRMAP[moving.t];
      board[row][col]={t:ft,p:currentPlayer};
      board[selected[0]][selected[1]]=null;
      playSound(isCapture?'capture':'place');
      lastMove={r:row,c:col};
      selected=null;validMoves=[];
      currentPlayer=currentPlayer===1?2:1;
      render();
      if(!gameOver&&mode==='ai'&&currentPlayer===2)scheduleAI();
      return;
    }
  }

  if(piece&&piece.p===currentPlayer){
    selected=[row,col]; validMoves=getMoves(board,row,col,piece); dropPiece=null;
  } else {
    selected=null; validMoves=[];
  }
  render();
}

function scheduleAI(){
  setAIThinking(true);
  aiTimer=setTimeout(()=>{
    const mv=getAIMv(board,[cap1,cap2],level);
    if(!mv){gameOver=1;setAIThinking(false);render();return;}
    const prevLen=cap2.length;
    const{b:nb,c:nc}=applyMv(board,[cap1,cap2],mv,2);
    const isCapture=nc[1].length>prevLen;
    if(mv.to){const t=board[mv.to[0]]?.[mv.to[1]];if(t?.t==='K')gameOver=2;}

    // push history for undo (AI move)
    history.push({
      board:nb.map(r=>r.map(c=>c?{...c}:null)),
      cap1:[...nc[0]],cap2:[...nc[1]],
      player:1,lastMove:{r:mv.to[0],c:mv.to[1]}
    });

    board=nb; cap1=nc[0]; cap2=nc[1];
    lastMove={r:mv.to[0],c:mv.to[1]};
    playSound(isCapture?'capture':'place');
    currentPlayer=1;
    setAIThinking(false);
    render();
  },400+Math.random()*300);
}

function undoMove(){
  if(history.length===0||gameOver)return;
  clearTimeout(aiTimer);
  const steps=mode==='ai'?Math.min(2,history.length):1;
  const prev=history[history.length-steps];
  board=prev.board.map(r=>r.map(c=>c?{...c}:null));
  cap1=[...prev.cap1]; cap2=[...prev.cap2];
  currentPlayer=prev.player;
  lastMove=prev.lastMove?{...prev.lastMove}:null;
  history=history.slice(0,history.length-steps);
  selected=null;validMoves=[];dropPiece=null;gameOver=false;
  setAIThinking(false);
  render();
}

// リサイズ対応
window.addEventListener('resize',()=>{if(document.getElementById('screen-game').classList.contains('active'))render();});
</script>
